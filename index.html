<!DOCTYPE html>
<html>
<head>
  <title>Game Tic-Tac-Toe</title>
  <script src="https://ajax.aspnetcdn.com/ajax/jQuery/jquery-3.4.1.min.js"></script>
  <link rel="stylesheet" type="text/css" href="style/Css.css">
</head>

<body>
    <div class="turnInfo turnx" id="turnInfox">player : X</div>
    <div class="turnInfo turny" id="turnInfoy">player : Y</div>
   
  <div class="btn-reset">  
    <button id="reset">Reset</button>
  </div>  
    <div class="container">  
      <div id="div1" class="game-tic" data-index= "0"></div>
      <div id="div2" class="game-tic" data-index= "1"></div>
      <div id="div3" class="game-tic" data-index= "2"></div>
      <div id="div4" class="game-tic" data-index= "3"></div>
      <div id="div5" class="game-tic" data-index= "4"></div>
      <div id="div6" class="game-tic" data-index= "5"></div>
      <div id="div7" class="game-tic" data-index= "6"></div>
      <div id="div8" class="game-tic" data-index= "7"></div>
      <div id="div9" class="game-tic" data-index= "8"></div> 
    </div>  
</body>
<script src="javaScript/slide.js"></script>
<script src="https://kit.fontawesome.com/2b7de5891c.js" crossorigin="anonymous"></script>
</html>
